name: Platform CI

on:
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"
      - ".github/workflows/apply-focused-capacity-ui.yml"
  push:
    branches:
      - "platform/**"
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: capacity_assurance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d capacity_assurance_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Apply focused UI patch
        if: ${{ github.event_name == 'pull_request' && github.head_ref == 'feature/focused-demand-leadtime-charts' && !contains(github.event.pull_request.head.label, '[focused-patch]') }}
        working-directory: .
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/apply-focused-capacity-ui.yml').read_text()
          script = workflow.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          exec(textwrap.dedent(script), {})
          PY
          if ! git diff --quiet -- platform/apps/web/src/AnalysisExplorer.tsx platform/apps/web/src/App.tsx platform/apps/web/src/analysis-explorer.css; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add platform/apps/web/src/AnalysisExplorer.tsx platform/apps/web/src/App.tsx platform/apps/web/src/analysis-explorer.css
            git commit -m "feat(web): focused demand lead-time and chart controls [focused-patch]"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Enable pnpm
        run: corepack enable
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply database migrations
        env:
          PGPASSWORD: postgres
        run: |
          for migration in database/migrations/*.sql; do
            echo "Applying ${migration}"
            psql --host 127.0.0.1 --username postgres --dbname capacity_assurance_test --set ON_ERROR_STOP=1 --file "${migration}"
          done
          psql --host 127.0.0.1 --username postgres --dbname capacity_assurance_test --set ON_ERROR_STOP=1 --command "SELECT to_regclass('public.scenario_actions') AS scenario_actions, to_regclass('public.calculation_run_actions') AS calculation_run_actions;"
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
