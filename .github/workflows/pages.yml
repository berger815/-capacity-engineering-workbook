name: Build Assessment Studio for GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "platform/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-build
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Enable pnpm
        run: corepack enable
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: platform
        run: pnpm install --no-frozen-lockfile
      - name: Build browser-only Assessment Studio
        working-directory: platform
        run: pnpm build
        env:
          VITE_STATIC_DEMO: "true"
          VITE_BASE_PATH: "/capacity-engineering-workbook/"
      - name: Preserve the legacy workbook
        run: |
          if [ ! -f legacy/capacity-workbook-v6.86.html ]; then
            mkdir -p legacy
            cp index.html legacy/capacity-workbook-v6.86.html
          fi
      - name: Publish generated files to main
        run: |
          rm -rf assets
          cp platform/apps/web/dist/index.html ./index.html
          cp -R platform/apps/web/dist/assets ./assets
          touch .nojekyll
      - name: Commit generated Pages build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll legacy/capacity-workbook-v6.86.html
          if git diff --cached --quiet; then
            echo "Pages build is already current."
            exit 0
          fi
          git commit -m "build(pages): publish Assessment Studio [skip ci]"
          git push origin main
